name: Update Feeds

on:
  schedule:
    - cron: '0 0 * * *'  # Ejecutar diariamente a las 00:00 UTC
  workflow_dispatch:  # Permitir ejecución manual
    inputs:
      reason:
        description: 'Why are you running the feed update manually?'
        required: false
        default: 'Retry feed update'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run script
        run: node src/index.js
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MANUAL_RUN_REASON: ${{ github.event.inputs.reason }}

      - name: Commit and push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add feeds/ news/
          git commit -m "Update feeds and news [skip ci]" || echo "No changes to commit"
          git push 
